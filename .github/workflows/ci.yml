name: CI

# Standing rails (AD-1, AD-23). Every push (any branch) and every PR to master runs the full gate
# set; a failing gate blocks merge once the checks below are required in branch protection.
# See README.md § Continuous Integration for the required-check list.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes — except on master, where every commit
# must keep its completed gate verdict (a cancelled run records nothing).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  # Fast code gates: lint (incl. import-boundary + domain/application purity), typecheck, the
  # production build, unit tests, and the coverage floor on src/domain + src/application.
  check:
    name: Lint · Typecheck · Build · Unit + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Lint (import-boundary + purity)
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests + coverage floor
        run: npm run test:coverage

  # Mutation testing over src/domain (AD-23): a surviving mutant fails the gate.
  mutation:
    name: Mutation testing (domain)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Mutation testing
        run: npm run test:mutation

  # Adapter integration gate (AD-24): the schema's invariants are proven against a REAL disposable
  # PostgreSQL 18 — never a mock. This is the one job with database access; the coverage and
  # mutation gates stay on the pure suite.
  integration:
    name: Integration (Postgres 18)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Postgres is pinned to 18 across all environments (spine Stack). The container's `postgres`
    # role is superuser — it owns the schema and runs migrations. The restricted runtime role
    # (payroll_app) is provisioned as a separate step; it must never be the migration role, since
    # `migrate dev` requires CREATEDB for its shadow database.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payroll
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Prisma 7 removed `url` from the datasource block and `migrate deploy` has no `--url` flag, so
    # the connection strings can ONLY reach Prisma through prisma.config.ts reading these.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/payroll?schema=public
      DATABASE_URL_APP: postgresql://payroll_app:payroll_app@localhost:5432/payroll?schema=public

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      # `postinstall` runs `prisma generate`, so the generated client exists from here on.
      - run: npm ci
      # Roles are cluster-wide and outlive `migrate dev`'s shadow database, so role creation is an
      # explicit infrastructure step rather than a migration (prisma/prisma#6581).
      #
      # Connection parameters are passed explicitly rather than reusing $DATABASE_URL: psql
      # rejects Prisma's `?schema=public` query parameter outright ("invalid URI query parameter"),
      # so the two tools cannot share one URL string.
      - name: Provision the restricted runtime role
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d payroll -v ON_ERROR_STOP=1 -f prisma/sql/bootstrap-roles.sql
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Integration tests (real Postgres 18)
        run: npm run test:integration

  # Accessibility floor (NFR9): an automated axe pass over the built app. Any violation fails.
  a11y:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Axe accessibility pass
        run: npm run test:a11y
